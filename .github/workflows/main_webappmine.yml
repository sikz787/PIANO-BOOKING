name: Build and deploy Python app to Azure Web App - webappmine

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # Change to your version if different

      - name: Create and activate virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask playwright pytest-playwright
          # This next line is the "Magic Fix" for Playwright's webServer
          pip install flask 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r --exclude venv/*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:

          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1CDBC767AB1740FAA0535375A51BDB35 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1D118203263E4C3EB6EAD4DBDA841B8F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8D437C9C510245C3A3508B1DAE8A7DF7 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webappmine'
          slot-name: 'Production'
          package: .