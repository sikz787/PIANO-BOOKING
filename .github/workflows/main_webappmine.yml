# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app with Playwright Tests - webappmine

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SET UP PYTHON (For Flask)
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pyodbc playwright pytest-playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 2. SET UP NODE (For Playwright Tests)
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 3. RUN TESTS (This starts app.py automatically via playwright.config.ts)
      - name: Run Playwright tests
        run: npx playwright test

      # 4. PREPARE FOR DEPLOYMENT
      - name: Zip artifact for deployment
        run: zip release.zip ./* -r --exclude venv/*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
       with:



          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1CDBC767AB1740FAA0535375A51BDB35 }}

          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1D118203263E4C3EB6EAD4DBDA841B8F }}

          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8D437C9C510245C3A3508B1DAE8A7DF7 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webappmine'
          slot-name: 'Production'
          package: .